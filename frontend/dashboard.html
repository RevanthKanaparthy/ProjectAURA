<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - Aura</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="dashboard-header">
        <h1 class="logo-icon">🔮 Aura Dashboard</h1>
        <button onclick="logout()" class="logout-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 5px;">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
            </svg>
            Logout
        </button>
    </header>

    <div class="container dashboard-grid">
        <!-- Left Column: Management -->
        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
            <!-- Upload Section -->
            <section class="glass-panel">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="typography-accent">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    Upload Documents
                </h3>
                <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1rem;">Supported: PDF, TXT, MD, Excel</p>
                <div class="input-group" style="flex-direction: column;">
                    <div class="file-upload-wrapper" onclick="document.getElementById('file').click()">
                        <div class="upload-icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="12" y1="8" x2="12" y2="16"></line>
                                <line x1="8" y1="12" x2="16" y2="12"></line>
                            </svg>
                        </div>
                        <span id="file-name-display" style="font-size: 0.9rem; color: var(--text-muted);">Select a file to upload</span>
                        <input type="file" id="file" onchange="document.getElementById('file-name-display').textContent = this.files[0] ? this.files[0].name : 'Select a file to upload'">
                    </div>
                    <button id="upload-btn" onclick="upload()" style="width: 100%;">Upload Document</button>
                </div>
                <p id="status-msg" style="margin-top: 10px; font-size: 0.85rem;" class="typography-accent"></p>
            </section>

            <!-- Document List Section -->
            <section class="glass-panel">
                <h3>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="typography-accent">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    Knowledge Base
                </h3>
                <button onclick="loadDocs()" class="secondary-btn">Refresh List</button>
                <ul id="doc-list" class="doc-list">
                    <div class="empty-state" id="doc-empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"></path>
                            <polyline points="13 2 13 9 20 9"></polyline>
                        </svg>
                        <p style="font-size: 0.9rem;">No documents uploaded yet.</p>
                    </div>
                </ul>
            </section>
        </div>

        <!-- Right Column: Chat -->
        <section class="glass-panel chat-panel" style="display: flex; flex-direction: column;">
            <h3>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="typography-accent">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                Test Chatbot
            </h3>
            <div id="chat-box" style="flex: 1; height: auto;">
                <div class="empty-state" id="chat-empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <h4>Testing Interface</h4>
                    <p style="font-size: 0.9rem; margin-top: 0.5rem;">Ask a question to verify the RAG system.</p>
                </div>
            </div>
            <div class="input-group">
                <input type="text" id="chat-input" placeholder="Ask a question abaout the documents...">
                <button id="send-btn">
                    <span>Send</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/admin.js"></script>
    <script src="js/chat.js"></script>
    <script>
        // Protect route
        if (!localStorage.getItem("access_token")) {
            window.location.href = "login.html";
        }
        // Initial load
        document.addEventListener("DOMContentLoaded", loadDocs);
    </script>
</body>
</html>
