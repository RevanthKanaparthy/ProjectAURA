<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College RAG Chatbot</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="dashboard-header">
        <h1>College Assistant</h1>
        <a href="login.html">
            <button class="outline-btn">Faculty Login</button>
        </a>
    </header>

    <div class="container">
        <div class="panel" style="max-width: 800px; margin: 40px auto;">
            <h3>Chat with AURA</h3>
            <div id="chat-box"></div>
            <div class="input-group">
                <input type="text" id="chat-input" placeholder="Ask about courses, patents, journals...">
                <button id="send-btn">Send</button>
            </div>
        </div>
    </div>

    <script src="js/chat.js"></script>
</body>
</html>
