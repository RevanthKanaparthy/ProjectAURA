<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="College Assistant Chatbot. Ask about courses, patents, journals, and more.">
    <title>College RAG Chatbot</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="dashboard-header">
        <h1 class="logo-icon">🔮 Aura Assistant</h1>
        <a href="login.html" style="text-decoration: none;">
            <button class="outline-btn">Faculty Login</button>
        </a>
    </header>

    <div class="container chat-container-wrapper">
        <div class="glass-panel" style="margin-top: 40px;">
            <h3>
                <span>Chat with AURA</span>
            </h3>
            
            <div id="chat-box">
                <div class="empty-state" id="chat-empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <h4>Welcome to Aura Assistant</h4>
                    <p style="font-size: 0.9rem; margin-top: 0.5rem;">Ask me anything about courses, patents, or journals.</p>
                </div>
            </div>
            
            <div class="input-group">
                <input type="text" id="chat-input" placeholder="Ask about courses, patents, journals..." aria-label="Chat input">
                <button id="send-btn">
                    <span>Send</span>
                    <!-- Simple SVG send icon -->
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
